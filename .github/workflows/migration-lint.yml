name: Migration Lint

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  lint-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: node supabase/tests/lint-migrations.mjs