name: Deploy Supabase Edge Function

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    # Require the CI workflow to have passed on this commit before deploying
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check if edge function changed
        id: changes
        run: |
          if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only HEAD~1 HEAD | grep -q '^supabase/functions/handle-new-user/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when function not changed
        if: steps.changes.outputs.changed != 'true'
        run: |
          echo "ℹ️ No changes detected in supabase/functions/handle-new-user/**"
          echo "Skipping deploy."
          exit 0

      - name: Setup Supabase CLI
        if: steps.changes.outputs.changed == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: steps.changes.outputs.changed == 'true'
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Function
        if: steps.changes.outputs.changed == 'true'
        run: supabase functions deploy --no-verify-jwt handle-new-user
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
